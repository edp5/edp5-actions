name: update-node-version
description: "This workflow get the latest node js version and open a pull request to update that"

inputs:
  token:
    description: "GitHub token to create pull requests"
    required: true

runs:
  using: "composite"
  steps:
    - name: Checkout code
      uses: actions/checkout@v7
      with:
        token: ${{ inputs.token }}

    - name: Get latest Node.js version
      id: get-latest-node
      shell: bash
      run: |
        LATEST_VERSION=$(curl -s https://nodejs.org/dist/index.json | jq -r '.[0].version' | sed 's/v//')
        echo "LATEST_VERSION=$LATEST_VERSION" >> $GITHUB_OUTPUT

    - name: Check if .nvmrc file is up to date
      id: check-nvmrc
      shell: bash
      run: |
        if [ ! -f .nvmrc ]; then
          echo ".nvmrc file not found, creating it with the latest version."
          CURRENT_VERSION="unknown"
          echo "${{ steps.get-latest-node.outputs.LATEST_VERSION }}" > .nvmrc
          echo "CURRENT_VERSION=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "UP_TO_DATE=false" >> $GITHUB_OUTPUT
        else
          CURRENT_VERSION=$(cat .nvmrc)
          echo "CURRENT_VERSION=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          if [ "$CURRENT_VERSION" = "${{ steps.get-latest-node.outputs.LATEST_VERSION }}" ]; then
            echo "UP_TO_DATE=true" >> $GITHUB_OUTPUT
            exit 0
          else
            echo "UP_TO_DATE=false" >> $GITHUB_OUTPUT
          fi
        fi

    - name: Check whether the release branch already exists
      id: check-branch
      shell: bash
      run: |
        BRANCH_NAME="update-node-version-to-${{ steps.get-latest-node.outputs.LATEST_VERSION }}"

        if gh api "repos/${{ github.repository }}/branches/$BRANCH_NAME" --silent >/dev/null 2>&1; then
          echo "BRANCH_EXISTS=true" >> $GITHUB_OUTPUT
        else
          echo "BRANCH_EXISTS=false" >> $GITHUB_OUTPUT
        fi

        echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_OUTPUT
      env:
        GITHUB_TOKEN: ${{ inputs.token }}

    - name: Update .nvmrc file
      if: steps.check-nvmrc.outputs.UP_TO_DATE == 'false' && steps.check-branch.outputs.BRANCH_EXISTS == 'false'
      shell: bash
      run: |
        echo "${{ steps.get-latest-node.outputs.LATEST_VERSION }}" > .nvmrc
        git config user.name "edp5-service"
        git config user.email "edp5-service@users.noreply.github.com"
        git checkout -b "${{ steps.check-branch.outputs.BRANCH_NAME }}"
        git add .nvmrc
        git commit -m "bump: Update Node.js version to ${{ steps.get-latest-node.outputs.LATEST_VERSION }}"
        git push -u origin "${{ steps.check-branch.outputs.BRANCH_NAME }}"

    - name: Create Pull Request
      if: steps.check-nvmrc.outputs.UP_TO_DATE == 'false'
      shell: bash
      run: |
        gh pr create --title "bump: Update Node.js version from ${{ steps.check-nvmrc.outputs.CURRENT_VERSION }} to ${{ steps.get-latest-node.outputs.LATEST_VERSION }}" --body "This PR updates the Node.js version in the .nvmrc file to the latest version ${{ steps.get-latest-node.outputs.LATEST_VERSION }}." --base main --head "${{ steps.check-branch.outputs.BRANCH_NAME }}" --label "Ready to merge,dependencies,no-coverage"
      env:
        GITHUB_TOKEN: ${{ inputs.token }}
